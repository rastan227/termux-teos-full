{% extends "base.html" %}
{% block title %}مدیریت کاربران{% endblock %}
{% block header %}👥 مدیریت کاربران{% endblock %}
{% block content %}
<div class="bg-white rounded-lg shadow">
    <div class="p-4 border-b">
        <input type="text" id="searchInput" placeholder="جستجوی کاربر..." class="border rounded px-3 py-1 w-64">
        <button onclick="searchUsers()" class="bg-blue-500 text-white px-4 py-1 rounded">جستجو</button>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead class="bg-gray-100">
                <tr>
                    <th class="p-3 text-right">شناسه</th>
                    <th class="p-3 text-right">نام</th>
                    <th class="p-3 text-right">نقش</th>
                    <th class="p-3 text-right">موجودی</th>
                    <th class="p-3 text-right">وضعیت</th>
                    <th class="p-3 text-right">عملیات</th>
                </tr>
            </thead>
            <tbody id="usersTable"></tbody>
        </table>
    </div>
    <div class="p-4 border-t flex justify-between">
        <button onclick="prevPage()" class="bg-gray-300 px-3 py-1 rounded">قبلی</button>
        <span id="pageInfo">صفحه 1</span>
        <button onclick="nextPage()" class="bg-gray-300 px-3 py-1 rounded">بعدی</button>
    </div>
</div>

<script>
    let currentPage = 1;
    let totalPages = 1;
    
    async function loadUsers(page = 1) {
        try {
            const res = await axios.get(`/api/admin/users?page=${page}&limit=20`);
            const users = res.data.items;
            totalPages = res.data.pages;
            currentPage = page;
            document.getElementById('pageInfo').innerText = `صفحه ${currentPage} از ${totalPages}`;
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = '';
            users.forEach(user => {
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="p-3">${user.telegram_id}</td>
                        <td class="p-3">${user.first_name} ${user.last_name || ''}</td>
                        <td class="p-3">${user.role}</td>
                        <td class="p-3">${user.wallet_balance.toLocaleString()}</td>
                        <td class="p-3">${user.is_active ? '🟢 فعال' : '🔴 غیرفعال'}</td>
                        <td class="p-3">
                            <button onclick="editUser(${user.telegram_id})" class="text-blue-500">ویرایش</button>
                            <button onclick="banUser(${user.telegram_id})" class="text-red-500">بن</button>
                        </td>
                    </tr>
                `;
            });
        } catch(e) { console.error(e); }
    }
    
    function searchUsers() {
        const query = document.getElementById('searchInput').value;
        // implement search
        loadUsers(1);
    }
    
    function prevPage() { if(currentPage > 1) loadUsers(currentPage-1); }
    function nextPage() { if(currentPage < totalPages) loadUsers(currentPage+1); }
    
    loadUsers();
</script>
{% endblock %}
