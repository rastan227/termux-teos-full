<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TEOS Admin Panel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-gray-900 text-white flex-shrink-0">
            <div class="p-4 text-center border-b border-gray-700">
                <h2 class="text-xl font-bold">TEOS Admin</h2>
            </div>
            <nav class="mt-4">
                <a href="/admin/dashboard" class="block py-2 px-4 hover:bg-gray-700">📊 داشبورد</a>
                <a href="/admin/users" class="block py-2 px-4 hover:bg-gray-700">👥 کاربران</a>
                <a href="/admin/music" class="block py-2 px-4 hover:bg-gray-700">🎵 موزیک</a>
                <a href="/admin/services" class="block py-2 px-4 hover:bg-gray-700">🛒 سرویس‌ها</a>
                <a href="/admin/orders" class="block py-2 px-4 hover:bg-gray-700">📦 سفارشات</a>
                <a href="/admin/payments" class="block py-2 px-4 hover:bg-gray-700">💰 پرداخت‌ها</a>
                <a href="/admin/tickets" class="block py-2 px-4 hover:bg-gray-700">🎫 تیکت‌ها</a>
                {% if is_owner %}
                <a href="/owner/plugins" class="block py-2 px-4 hover:bg-gray-700">🧩 پلاگین‌ها</a>
                <a href="/owner/settings" class="block py-2 px-4 hover:bg-gray-700">⚙️ تنظیمات</a>
                {% endif %}
                <a href="/logout" class="block py-2 px-4 hover:bg-gray-700 mt-8 text-red-400">🚪 خروج</a>
            </nav>
        </div>
        
        <!-- Main Content -->
        <div class="flex-1 overflow-y-auto">
            <div class="bg-white shadow p-4">
                <h1 class="text-2xl font-bold">{% block header %}داشبورد{% endblock %}</h1>
            </div>
            <div class="p-6">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    <script>
        // Set auth token from localStorage
        const token = localStorage.getItem('token');
        if (token) {
            axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
