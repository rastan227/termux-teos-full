version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: teos_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER:-teos}
      POSTGRES_PASSWORD: ${DB_PASS:-teos_pass}
      POSTGRES_DB: ${DB_NAME:-teos_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - teos_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teos"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: teos_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - teos_network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  bot:
    build: .
    container_name: teos_bot_prod
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage:/app/storage
      - logs:/app/logs
    networks:
      - teos_network
    restart: always
    command: python -m app.main
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  api:
    build: .
    container_name: teos_api_prod
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - teos_network
    restart: always
    command: gunicorn app.api.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --max-requests 1000 --max-requests-jitter 100
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: teos_nginx_prod
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./static:/static:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - teos_network
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    container_name: teos_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    networks:
      - teos_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: teos_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - teos_network
    restart: unless-stopped

networks:
  teos_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage:
  logs:
  prometheus_data:
  grafana_data:
