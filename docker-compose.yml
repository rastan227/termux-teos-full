version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: teos_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-teos}
      POSTGRES_PASSWORD: ${DB_PASS:-teos_pass}
      POSTGRES_DB: ${DB_NAME:-teos_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teos_network

  redis:
    image: redis:7-alpine
    container_name: teos_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teos_network

  bot:
    build: .
    container_name: teos_bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    command: python -m app.main
    restart: unless-stopped
    networks:
      - teos_network

  api:
    build: .
    container_name: teos_api
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - teos_network

networks:
  teos_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
