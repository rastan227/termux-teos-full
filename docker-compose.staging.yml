version: '3.8'

services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres
    environment:
      POSTGRES_PASSWORD: staging_pass
    volumes:
      - postgres_staging:/var/lib/postgresql/data

  redis:
    extends:
      file: docker-compose.yml
      service: redis
    volumes:
      - redis_staging:/data

  bot:
    extends:
      file: docker-compose.yml
      service: bot
    environment:
      DEBUG: "true"
      ENVIRONMENT: staging
    volumes:
      - ./app:/app/app
    command: python -m app.main

  api:
    extends:
      file: docker-compose.yml
      service: api
    environment:
      DEBUG: "true"
      ENVIRONMENT: staging
    volumes:
      - ./app:/app/app
    command: uvicorn app.api.main:app --reload --host 0.0.0.0 --port 8000

volumes:
  postgres_staging:
  redis_staging:
